<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yamen Shahood | Portfolio</title>
    <style>
        /* إعدادات الصفحة الأساسية */
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 50px;
        }

        /* حاوية الشهادة والملف الشخصي */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            margin-top: 50px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: center;
            max-width: 700px;
            width: 90%;
            position: relative; /* لتحديد موقع العناصر الداخلية */
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        /* تنسيق الصورة الشخصية الدائرية في الأعلى */
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%; /* تجعلها دائرية */
            object-fit: cover; /* لضمان عدم تمدد الصورة */
            border: 5px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 10px 0;
            background: linear-gradient(to right, #00d4ff, #0083b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h3 {
            color: #bdc3c7;
            font-weight: 300;
            letter-spacing: 1px;
            margin-top: 0;
        }

        /* تنسيق الشهادة */
        .cert-container {
            margin-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
        }

        .cert-title {
            color: #00d4ff;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .certificate-img {
            width: 100%;
            border-radius: 12px;
            margin: 10px 0 20px 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.05);
        }

        /* زر التواصل */
        .btn {
            display: inline-block;
            padding: 12px 35px;
            background: linear-gradient(45deg, #00d4ff, #0083b0);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
            margin-top: 10px;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            opacity: 0.9;
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="my-avatar.jpg" class="profile-avatar" alt="Yamen Shahood">
        
        <h1>YAMEN SHAHOOD</h1>
        <h3>Software Engineering Student</h3>
        
        <div class="cert-container">
            <p class="cert-title">Algorithms Level - 1 Certificate</p>
            
            <img src="yamen.jpg" class="certificate-img" alt="My Certificate">
        </div>

        <a href="https://www.linkedin.com/in/your-profile-name" class="btn" target="_blank">LinkedIn Profile</a>
    </div>

</body>
</html>
